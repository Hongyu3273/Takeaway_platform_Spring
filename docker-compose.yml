version: "3.9"

# One command to start the full stack: docker-compose up -d
# One command to stop:                 docker-compose down
# One command to wipe data volumes:    docker-compose down -v

services:

  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sky-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE:      sky_take_out
    ports:
      - "3306:3306"
    volumes:
      # Persist data across restarts
      - mysql-data:/var/lib/mysql
      # Auto-run SQL scripts on first start (put sky.sql here)
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sky-net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sky-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - sky-net

  # ── Spring Boot app ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sky-app
    ports:
      - "8080:8080"
    environment:
      # Override application.yml values at runtime via env vars
      # Spring Boot maps SPRING_DATASOURCE_* → spring.datasource.*
      SPRING_DATASOURCE_DRUID_URL:      jdbc:mysql://mysql:3306/sky_take_out?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_DRUID_USERNAME: root
      SPRING_DATASOURCE_DRUID_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST:           redis
      SPRING_DATA_REDIS_PORT:           6379
      SPRING_DATA_REDIS_PASSWORD:       ""
      SPRING_DATA_REDIS_DATABASE:       0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sky-net
    restart: on-failure

volumes:
  mysql-data:
  redis-data:

networks:
  sky-net:
    driver: bridge
